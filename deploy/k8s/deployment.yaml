apiVersion: apps/v1
kind: Deployment
metadata:
  name: billtracker
  namespace: billtracker
  labels:
    app: billtracker
spec:
  replicas: 1
  # Keep this at 1: the scheduler (bill instance generation, SimpleFIN
  # refresh, vendor connector refresh) has no distributed locking, same
  # caveat as hhq itself. Don't scale past 1 without adding that first.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: billtracker
  template:
    metadata:
      labels:
        app: billtracker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: billtracker
          image: ghcr.io/mscreations/billtracker-plugin:latest # replace with your actual registry/image/tag
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: billtracker-config
            - secretRef:
                name: billtracker-app-secrets
          env:
            # Mapped individually from the CNPG-generated cluster secret.
            # Adjust key names (user/password/dbname/host/port) if your CNPG
            # version names them differently - see secret-example.yaml note.
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: myapp-postgres-app
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: myapp-postgres-app
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: myapp-postgres-app
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: myapp-postgres-app
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myapp-postgres-app
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            # readOnlyRootFilesystem above means anything the app writes at
            # runtime needs an explicit writable mount. The app itself doesn't
            # currently write to disk (state lives in Postgres), but /tmp is
            # provided in case a future feature needs it.
            - name: tmp
              mountPath: /tmp
            # Optional: mount billtracker-bootstrap-config (see
            # secret-example.yaml) at CONFIG_DIR (/config, per the
            # ConfigMap) to bootstrap bills from bills.json. Uncomment both
            # this and the matching volume below if you use it.
            # - name: bootstrap-config
            #   mountPath: /config
            #   readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        # - name: bootstrap-config
        #   secret:
        #     secretName: billtracker-bootstrap-config
