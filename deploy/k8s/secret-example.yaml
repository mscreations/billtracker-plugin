# EXAMPLE ONLY. Do not commit real secrets to source control.
# Apply this with real values via `kubectl apply -f` (from a local, untracked
# copy) or better, generate it with `kubectl create secret generic ...`,
# or manage it via Sealed Secrets / External Secrets / SOPS in a GitOps setup.
#
# ENCRYPTION_KEY is REQUIRED (used for SimpleFIN/vendor-portal secrets at
# rest, and to encrypt the shared token this plugin self-issues to hhq on
# first contact - see internal/handlers/register.go and this repo's
# CLAUDE.md). No separate auth secret to generate/distribute: hhq and this
# plugin agree on a token automatically the first time hhq successfully
# reaches this plugin's POST /register - nothing to configure here for that.
# Generate with:
#   openssl rand -hex 32   -> ENCRYPTION_KEY (must be exactly 32 bytes hex = 64 chars)
apiVersion: v1
kind: Secret
metadata:
  name: billtracker-app-secrets
  namespace: billtracker
type: Opaque
stringData:
  ENCRYPTION_KEY: "REPLACE_ME_64_HEX_CHARS"

---
# Optional: bootstrap bills on every startup instead of adding them one at a
# time via the settings UI, by mounting this Secret as a volume at
# CONFIG_DIR (default /config - see deployment.yaml's volumeMount). Each key
# below becomes a file in that directory. Reconciled by name on every
# startup: new entries are created, existing entries that were themselves
# created by this file are kept in sync with it, removing an entry deletes
# that bill (and its history), and a same-named bill created through the
# settings UI is left untouched. See bills.json.example / README.md for the
# full schedule-field reference (monthly/quarterly/one_off).
apiVersion: v1
kind: Secret
metadata:
  name: billtracker-bootstrap-config
  namespace: billtracker
type: Opaque
stringData:
  bills.json: |
    [
      {"name": "Electric", "amount": 128.43, "schedule": "monthly", "day_of_month": 5},
      {"name": "Internet", "amount": 79.99, "schedule": "monthly", "day_of_month": 12, "vendor_url": "https://example-isp.com/pay"},
      {"name": "Annual insurance premium", "amount": 612.00, "schedule": "one_off", "one_off_date": "2026-09-01"}
    ]

---
# NOTE: Database credentials are NOT defined here. This deployment reads them
# directly from the Secret CloudNativePG already generates for your Cluster,
# conventionally named "<cluster-name>-app" (e.g. "myapp-postgres-app").
# Verify the exact key names in your cluster with:
#   kubectl get secret myapp-postgres-app -n <namespace> -o jsonpath='{.data}' | jq 'keys'
# This deployment assumes the SAME database hhq itself uses is reused here
# (common per README.md - this app's tables are all bt_-prefixed and its own
# migration bookkeeping table is bt_goose_db_version, so the two apps' schemas
# can't collide even sharing one database). Point DB_NAME at hhq's own
# database name, or a different one entirely if you'd rather keep them
# separate - deployment.yaml maps user/password/dbname/host/port from
# whichever CNPG-generated secret you name below.
