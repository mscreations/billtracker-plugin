name: Publish image to GHCR

# Builds and pushes the Docker image for a given version. Called directly
# (via `uses: ./.github/workflows/publish.yml`) as a job from version-dev.yml
# and version-main.yml right after they push a new tag - NOT triggered by
# `push: tags:` on its own, because the tag pushes those workflows make use
# the default GITHUB_TOKEN, and GitHub Actions deliberately does not let a
# GITHUB_TOKEN-authored push trigger further workflow runs (recursion
# prevention). Calling this as a reusable workflow sidesteps that entirely,
# since it's part of the same run rather than a separately-triggered one.
# The `push: tags:` trigger is kept too, so a manually-pushed version tag
# (not made by the bot) still publishes on its own. workflow_dispatch is for
# manual recovery (e.g. re-publishing a tag whose original automated publish
# was skipped for some unrelated reason) without needing a personal token
# scoped for GHCR - `gh workflow run publish.yml -f version=v1.2.3`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to build and publish, e.g. "v1.2.3" or "v1.2.4-dev"'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Tag to build and publish, e.g. "v1.2.3" or "v1.2.4-dev" - falls back to the triggering tag ref when omitted (the push: tags: case)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only takes effect for the direct push:tags: trigger - when called via
    # workflow_call, the caller's job-level permissions apply instead and
    # this block is ignored.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.version }}

      - name: Determine version and floating tag
        id: vars
        run: |
          set -euo pipefail
          RAW="${{ inputs.version }}"
          if [ -z "$RAW" ]; then
            RAW="$GITHUB_REF_NAME"
          fi
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-dev ]]; then
            echo "floating=latest-dev" >> "$GITHUB_OUTPUT"
          else
            echo "floating=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          tags: |
            ghcr.io/mscreations/billtracker-plugin:${{ steps.vars.outputs.version }}
            ghcr.io/mscreations/billtracker-plugin:${{ steps.vars.outputs.floating }}
